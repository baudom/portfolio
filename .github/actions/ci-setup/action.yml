name: '⚙️ CI Setup & Verify'
description: 'Sets up Node, installs dependencies, lints, and verifies docker build'
runs:
  using: "composite"
  steps:
    - name: '🟢 Install Node.js'
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: '📦 Install Dependencies'
      run: yarn install
      shell: bash
    - name: '🧹 Execute lint'
      run: yarn lint
      shell: bash
    - name: '🐳 Verify docker build'
      run: docker build .
      shell: bash
